name: Build WinFlashPro.exe

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller PyQt6 PyQt6-Qt6 PyQt6-sip psutil requests

      - name: Build .exe
        run: >
          pyinstaller
          --noconfirm
          --onefile
          --windowed
          --uac-admin
          --name WinFlashPro
          --add-data "app;app"
          --add-data "core;core"
          --collect-all PyQt6
          --hidden-import psutil
          --hidden-import requests
          --hidden-import plistlib
          --hidden-import ctypes
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinFlashPro
          path: dist/WinFlashPro.exe
          retention-days: 30

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_number }}
          name: "WinFlash Pro — Build ${{ github.run_number }}"
          body: |
            ## Установка
            1. Скачай `WinFlashPro.exe`
            2. Запусти от имени администратора
            3. Python и другие программы **не нужны**
          artifacts: dist/WinFlashPro.exe
          token: ${{ secrets.GITHUB_TOKEN }}
