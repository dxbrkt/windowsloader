name: Build WinFlashPro.exe

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt6 psutil requests

      - name: Build .exe
        run: |
          pyinstaller --noconfirm --onefile --windowed --uac-admin --name WinFlashPro --add-data "app;app" --add-data "core;core" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinFlashPro
          path: dist/WinFlashPro.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "WinFlash Pro — Build ${{ github.run_number }}"
          files: dist/WinFlashPro.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
